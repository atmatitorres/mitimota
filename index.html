<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>mitimota | Calculadora de Cuentas</title>
    <!-- Google Fonts: Poppins (Dura/Impacto) e Inter (Lectura) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6750A4;
            --orange: #FF9500; /* Tu color favorito */
            --bg: #FDF7FF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #1C1B1F;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .poppins-extra { font-family: 'Poppins', sans-serif; font-weight: 900; }
        
        /* Estética Pill-Shaped */
        .pill { border-radius: 9999px; }
        .card-m3 { 
            background: white; 
            border-radius: 35px; 
            border: 2px solid #E7E0EB;
            box-shadow: 0 10px 30px rgba(103, 80, 164, 0.03);
        }

        /* Input Restaurante Estilo Línea */
        .res-input {
            border: none;
            border-bottom: 4px solid #E7E0EB;
            background: transparent;
            font-size: 2.4rem;
            outline: none;
            width: 100%;
            padding: 10px 0;
            color: var(--primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .res-input:focus { border-bottom-color: var(--orange); }

        /* FAB (+) Corregido y Fijo */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            background-color: var(--orange);
            color: white;
            border-radius: 26px;
            box-shadow: 0 15px 45px rgba(255, 149, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab:hover { transform: scale(1.1); }
        .fab:active { transform: scale(0.9) rotate(5deg); }

        .fade-in { animation: mmFade 0.4s ease-out; }
        @keyframes mmFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-5 md:p-10">

    <div id="app-wrap" class="max-w-md mx-auto relative pb-32">
        <!-- HEADER -->
        <header class="flex justify-between items-center mb-10">
            <button onclick="ui.confirmNew()" class="p-4 bg-purple-100 text-purple-800 pill hover:bg-red-50"><i data-lucide="file-plus-2"></i></button>
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-purple-600 rounded-2xl rotate-12 flex items-center justify-center shadow-lg"><span class="text-white poppins-extra text-xl -rotate-12">M</span></div>
                <h1 class="poppins-extra text-xl tracking-tighter text-purple-900 mt-2 uppercase">mitimota</h1>
            </div>
            <button onclick="ui.showHistory()" class="p-4 bg-purple-100 text-purple-800 pill"><i data-lucide="history"></i></button>
        </header>

        <input type="text" id="resName" class="res-input poppins-extra mb-10" value="Restaurante">

        <div id="people-list" class="space-y-6"></div>

        <div id="empty-state" class="text-center py-20 opacity-20">
            <i data-lucide="users-2" class="w-20 h-20 mx-auto mb-4"></i>
            <p class="font-bold text-lg">Agrega a la primera persona<br>con el botón +</p>
        </div>

        <!-- DESCUENTOS -->
        <div id="disc-section" class="hidden mt-12 mb-8 bg-orange-50 p-8 rounded-[40px] border-2 border-orange-100">
            <h2 class="poppins-extra text-[10px] mb-4 uppercase tracking-[0.3em] text-orange-800/40">¿Algún Descuento?</h2>
            <div class="flex gap-4">
                <input type="number" id="pct" placeholder="% Dcto." class="w-1/2 p-5 bg-white pill outline-none focus:ring-4 ring-orange-200 font-black text-orange-900">
                <input type="number" id="cap" placeholder="Tope" class="w-1/2 p-5 bg-white pill outline-none focus:ring-4 ring-orange-200 font-black text-orange-900">
            </div>
        </div>

        <!-- RESUMEN -->
        <div id="summary" class="hidden mt-10 p-10 bg-purple-900 text-white rounded-[50px] shadow-2xl">
            <h2 class="poppins-extra text-3xl text-center mb-8">Resumen</h2>
            <div class="space-y-4 opacity-70 font-semibold">
                <div class="flex justify-between"><span>Subtotal</span><span id="sumSub">$0</span></div>
                <div class="flex justify-between text-green-300"><span>Descuento</span><span id="sumDisc">-$0</span></div>
                <div class="flex justify-between"><span>Propina (10%)</span><span id="sumTip">$0</span></div>
            </div>
            <div class="h-px bg-white/20 my-8"></div>
            <div class="flex justify-between items-center mb-10">
                <span class="poppins-extra text-lg text-purple-200 uppercase tracking-widest">Total</span>
                <span id="sumTotal" class="poppins-extra text-5xl">$0</span>
            </div>
            <button onclick="logic.save()" class="w-full py-6 bg-white text-purple-900 poppins-extra text-xl pill shadow-xl active:scale-95 transition-all">GUARDAR</button>
        </div>

        <!-- FAB (+) -->
        <button onclick="ui.modalAdd()" class="fab"><i data-lucide="plus" class="w-12 h-12"></i></button>

        <!-- MODALES -->
        <div id="overlay" class="fixed inset-0 bg-purple-950/80 backdrop-blur-md z-[2000] hidden items-center justify-center p-6" onclick="if(event.target===this) ui.closeModal()">
            <div id="modal" class="card-m3 w-full max-w-sm p-10 shadow-2xl fade-in" onclick="event.stopPropagation()"></div>
        </div>
    </div>

    <script>
        const logic = {
            people: [],
            palette: ["#40c057", "#339af0", "#7048e8", "#be4bdb", "#f06595", "#fd7e14", "#fcc419"],
            
            add(name) {
                if(!name) return;
                this.people.push({ id: Date.now().toString(), name, color: this.palette[this.people.length % this.palette.length], items: [], subtotal:0, disc:0, tip:0, total:0 });
                this.calc();
            },
            calc() {
                const pct = parseFloat(document.getElementById("pct").value) || 0;
                const cap = parseFloat(document.getElementById("cap").value) || Infinity;
                let gSub = 0;
                this.people.forEach(p => { p.subtotal = p.items.reduce((a,b)=>a+b.price, 0); gSub += p.subtotal; });
                const actualDisc = Math.min(gSub * (pct/100), cap);
                this.people.forEach(p => {
                    const ratio = gSub > 0 ? p.subtotal / gSub : 0;
                    p.disc = actualDisc * ratio;
                    p.tip = p.subtotal * 0.10;
                    p.total = p.subtotal - p.disc + p.tip;
                });
                ui.refresh();
            },
            save() {
                const h = JSON.parse(localStorage.getItem("mm_h_final") || "[]");
                h.unshift({ id: Date.now(), res: document.getElementById("resName").value, date: new Date().toLocaleString(), total: this.people.reduce((a,b)=>a+b.total,0), data: JSON.parse(JSON.stringify(this.people)), pct: document.getElementById("pct").value, cap: document.getElementById("cap").value });
                localStorage.setItem("mm_h_final", JSON.stringify(h));
                alert("¡Cuenta guardada!");
                this.people = []; this.calc();
            }
        };

        const ui = {
            refresh() {
                const container = document.getElementById("people-list");
                if(logic.people.length === 0) { 
                    container.innerHTML = ""; 
                    document.getElementById("empty-state").classList.remove("hidden");
                    document.getElementById("summary").classList.add("hidden");
                    document.getElementById("disc-section").classList.add("hidden");
                } else {
                    document.getElementById("empty-state").classList.add("hidden");
                    document.getElementById("summary").classList.remove("hidden");
                    document.getElementById("disc-section").classList.remove("hidden");
                    container.innerHTML = logic.people.map(p => `
                        <div class="card-m3 p-8 border-l-[12px] fade-in" style="border-left-color: ${p.color}">
                            <div class="flex justify-between items-start mb-6">
                                <span class="poppins-extra text-2xl px-6 py-2 pill" style="background: ${p.color}15; color: ${p.color}">${p.name}</span>
                                <button onclick="ui.removePerson(\'${p.id}\')" class="p-2 text-red-300 hover:text-red-600"><i data-lucide="user-minus"></i></button>
                            </div>
                            <div class="flex gap-2 mb-6">
                                <input type="text" id="n-${p.id}" placeholder="Nombre" class="w-1/3 p-4 bg-gray-50 pill outline-none font-bold">
                                <input type="number" id="p-${p.id}" placeholder="Precio" class="w-1/3 p-4 bg-gray-50 pill outline-none font-black poppins-extra text-lg focus:ring-2 ring-purple-300" onkeydown="if(event.key===\'Enter\') ui.addItem(\'${p.id}\')">
                                <button onclick="ui.addItem(\'${p.id}\')" class="w-14 h-14 bg-purple-600 text-white pill flex items-center justify-center shadow-lg active:scale-90 transition-transform"><i data-lucide="check"></i></button>
                            </div>
                            <div class="space-y-3 mb-6">
                                ${p.items.map(i => `
                                    <div class="flex justify-between items-center group">
                                        <span class="text-sm font-semibold text-gray-500">${i.name}</span>
                                        <span class="poppins-extra text-lg text-gray-900">$${Math.round(i.price).toLocaleString()}</span>
                                    </div>
                                `).join("")}
                            </div>
                            <div class="pt-6 border-t border-dashed space-y-1 text-xs font-bold opacity-40 uppercase tracking-widest">
                                <div class="flex justify-between"><span>Subtotal</span><span>$${Math.round(p.subtotal).toLocaleString()}</span></div>
                                <div class="flex justify-between text-green-600"><span>Propina</span><span>$${Math.round(p.tip).toLocaleString()}</span></div>
                                <div class="flex justify-between pt-4 poppins-extra text-4xl opacity-100" style="color:${p.color}"><span>TOTAL</span><span>$${Math.round(p.total).toLocaleString()}</span></div>
                            </div>
                        </div>
                    `).join("");
                }
                const total = logic.people.reduce((a,b)=>a+b.total,0);
                document.getElementById("sumSub").innerText = "$" + Math.round(logic.people.reduce((a,b)=>a+b.subtotal,0)).toLocaleString();
                document.getElementById("sumDisc").innerText = "-$" + Math.round(logic.people.reduce((a,b)=>a+b.disc,0)).toLocaleString();
                document.getElementById("sumTip").innerText = "$" + Math.round(logic.people.reduce((a,b)=>a+b.tip,0)).toLocaleString();
                document.getElementById("sumTotal").innerText = "$" + Math.round(total).toLocaleString();
                lucide.createIcons();
            },
            addItem(pid) {
                const n = document.getElementById("n-"+pid), p = document.getElementById("p-"+pid);
                if(!p.value) return;
                logic.addItem(pid, n.value, p.value);
                n.value=""; p.value=""; p.focus();
            },
            removePerson(id) { logic.people = logic.people.filter(x=>x.id!==id); logic.calc(); },
            modalAdd() {
                this.openModal(`
                    <h2 class="poppins-extra text-3xl mb-8 text-purple-900">Agregar persona</h2>
                    <input type="text" id="m-name" placeholder="Nombre..." class="w-full p-6 bg-gray-50 pill outline-none mb-8 font-black text-xl text-purple-900 focus:ring-4 ring-purple-100" autofocus>
                    <div class="flex gap-4">
                        <button onclick="ui.closeModal()" class="flex-1 font-bold text-gray-400">Cerrar</button>
                        <button onclick="logic.add(document.getElementById(\'m-name\').value); ui.closeModal()" class="flex-1 py-5 bg-purple-600 text-white pill poppins-extra shadow-xl">LISTO</button>
                    </div>
                `);
                document.getElementById("m-name").onkeydown = e => { if(e.key==="Enter") { logic.add(e.target.value); ui.closeModal(); } };
            },
            showHistory() {
                const h = JSON.parse(localStorage.getItem("mm_h_final") || "[]");
                this.openModal(`
                    <h2 class="poppins-extra text-3xl mb-8 text-purple-900">Historial</h2>
                    <div class="max-h-80 overflow-y-auto space-y-4 mb-8">
                        ${h.length ? h.map((x,i) => `
                            <div onclick="ui.loadHist(${i})" class="p-6 bg-purple-50 rounded-[30px] flex justify-between items-center cursor-pointer hover:bg-orange-50">
                                <div><div class="poppins-extra text-purple-900">${x.res}</div><div class="text-[10px] opacity-40 font-bold">${x.date}</div></div>
                                <div class="poppins-extra text-2xl text-purple-600">$${Math.round(x.total).toLocaleString()}</div>
                            </div>
                        `).join("") : "<p class=\'text-center opacity-30\'>No hay cuentas.</p>"}
                    </div>
                    <button onclick="ui.closeModal()" class="w-full py-5 bg-gray-100 pill font-bold text-gray-400">CERRAR</button>
                `);
            },
            loadHist(i) {
                const x = JSON.parse(localStorage.getItem("mm_h_final"))[i];
                logic.people = JSON.parse(JSON.stringify(x.data));
                document.getElementById("resName").value = x.res;
                document.getElementById("pct").value = x.pct || "";
                document.getElementById("cap").value = x.cap || "";
                this.closeModal(); logic.calc();
            },
            confirmNew() {
                this.openModal(`
                    <h2 class="poppins-extra text-3xl mb-6 text-red-600">¿Borrar todo?</h2>
                    <p class="text-gray-500 mb-10 font-medium">¿Seguro quieres crear una cuenta nueva?</p>
                    <div class="flex gap-4">
                        <button onclick="ui.closeModal()" class="flex-1 font-bold text-gray-400">NO</button>
                        <button onclick="logic.people=[]; logic.calc(); ui.closeModal()" class="flex-1 py-5 bg-red-600 text-white pill poppins-extra">SÍ, BORRAR</button>
                    </div>
                `);
            },
            openModal(html) { document.getElementById("modal").innerHTML = html; document.getElementById("overlay").classList.replace("hidden", "flex"); },
            closeModal() { document.getElementById("overlay").classList.replace("flex", "hidden"); }
        };

        window.onload = () => { lucide.createIcons(); ui.refresh(); document.getElementById("pct").oninput = () => logic.calc(); document.getElementById("cap").oninput = () => logic.calc(); };
    </script>
</body>
</html>
